server:
  port: ${PORT:5102}
spring:
  flyway:
    enabled: false
    locations: classpath:db/migration
eshop:
  migrations:
    enabled: ${ESHOP_MIGRATIONS_ENABLED:auto}
    database: Microsoft.eShopOnContainers.Services.OrderingDb
    url: ${ORDERING_DATASOURCE_URL:${SPRING_DATASOURCE_URL:}}
    user: ${ORDERING_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
    password: ${ORDERING_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
